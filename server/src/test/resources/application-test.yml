spring:
  datasource:
    url: jdbc:h2:mem:cotf_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

jwt:
  secret: test-secret-must-be-at-least-32-chars-long-please
  access-expiration: 900000
  refresh-expiration: 604800000
